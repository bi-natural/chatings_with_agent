version: '3.8'

services:
  vllm-monitoring:
    build: .
    image: vllm-monitoring:latest
    container_name: vllm-server
    
    # GPU 설정
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    # 포트 매핑
    ports:
      - "8000:8000"  # 통합 엔드포인트 (vLLM + Loki + Promtail)
    
    # 볼륨 마운트
    volumes:
      # 모델 디렉토리 (읽기 전용)
      - /home/models:/models:ro
      # Loki 데이터 영구 저장
      - loki-data:/var/lib/loki
      # 로그 영구 저장 (선택사항)
      - vllm-logs:/var/log/vllm
    
    # 환경 변수 설정
    environment:
      # 필수: 모델 경로
      - MODEL_PATH=/models/model-vlm-8b
      
      # 선택: 서빙 모델 이름
      - SERVED_MODEL_NAME=model-vlm-8b
      
      # vLLM 파라미터
      - MAX_MODEL_LEN=16384
      - TENSOR_PARALLEL_SIZE=1
      - GPU_MEMORY_UTILIZATION=0.9
      - MAX_NUM_SEQS=3
      - MAX_NUM_BATCHED_TOKENS=6384
      - TRUST_REMOTE_CODE=true
      
      # 멀티모달 설정
      - ASYNC_SCHEDULING=true
      - MM_ENCODER_TP_MODE=data
      - LIMIT_MM_PER_PROMPT_IMAGE=3
      - LIMIT_MM_PER_PROMPT_VIDEO=0
      
      # 추가 vLLM 인자 (선택사항)
      # - VLLM_EXTRA_ARGS=--enable-chunked-prefill
    
    # 재시작 정책
    restart: unless-stopped
    
    # 헬스체크
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    
    # 로그 설정
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  loki-data:
  vllm-logs:
